<!doctype html>
<html lang="en">
  <head>
    <!-- Privacy-friendly analytics by Plausible -->
    <script async src="https://analytics.gisbi.me/js/pa-mho_h2uy9LnnaV-9Cp9Vf.js"></script>
    <script>
    window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
    plausible.init()
    </script>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- preload the two faces above the fold: brand (Fredoka) + reading (Newsreader) -->
    <link rel="preload" href="%sveltekit.assets%/fonts/fredoka-variable.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="%sveltekit.assets%/fonts/newsreader-variable.woff2" as="font" type="font/woff2" crossorigin />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
