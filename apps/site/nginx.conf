server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # adapter-static (trailingSlash: 'never') emits flat files like
        # `privacy.html`/`docs.html`, not `privacy/index.html`. Try `$uri.html`
        # before the SPA fallback so /privacy resolves to privacy.html instead
        # of silently serving the root index (which read as an invalid privacy
        # policy to the Chrome Web Store reviewer).
        try_files $uri $uri.html $uri/ /index.html;
    }
}
