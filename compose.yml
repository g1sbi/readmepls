name: readmepls

services:
  pocketbase:
    image: ghcr.io/${IMAGE_OWNER:-owner}/readmepls-pocketbase:latest
    build:
      context: .
      dockerfile: pocketbase/Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "${PB_PORT:-8090}:8090"
    volumes:
      - pb_data:/pb_data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 5

  web:
    image: ghcr.io/${IMAGE_OWNER:-owner}/readmepls-web:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PB_URL: http://pocketbase:8090
      # Browser-facing PB origin. From .env by default; overridable at runtime
      # (the smoke test injects a sentinel to prove it reaches the browser).
      PUBLIC_PB_URL: ${PUBLIC_PB_URL:-http://localhost:8090}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      pocketbase:
        condition: service_healthy

  worker:
    image: ghcr.io/${IMAGE_OWNER:-owner}/readmepls-worker:latest
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PB_URL: http://pocketbase:8090
      # Empty by default (real provider). The smoke test exports AI_PROVIDER=mock
      # so the worker completes jobs offline; overrides the .env value.
      AI_PROVIDER: ${AI_PROVIDER:-}
    depends_on:
      pocketbase:
        condition: service_healthy

volumes:
  pb_data:
