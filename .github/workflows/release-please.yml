name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Uses the built-in GITHUB_TOKEN (contents+pull-requests write granted
          # above). No PAT needed: docker-publish triggers on push to main, so
          # images build without a tag-created event to fan out from.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
