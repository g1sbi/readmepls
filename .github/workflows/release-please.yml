name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Classic PAT with `repo` scope. This account's fine-grained tokens and
          # the built-in GITHUB_TOKEN both 403 on create-a-release (enterprise
          # policy caps the fine-grained permission model), while a classic PAT
          # works — so releases must run under it.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
