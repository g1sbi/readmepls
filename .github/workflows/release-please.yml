name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: TEMP diagnostic - check token scopes
        env:
          TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          curl -sI -H "Authorization: token $TOKEN" https://api.github.com/user | grep -i x-oauth-scopes || echo "no x-oauth-scopes header returned"

      - name: TEMP diagnostic - try raw release creation with this exact token
        env:
          TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          curl -sS -w "\nHTTP_STATUS:%{http_code}\n" \
            -X POST \
            -H "Authorization: token $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/g1sbi/readmepls/releases \
            -d '{"tag_name":"v0.0.0-diagnostic-token-test","target_commitish":"main","name":"diagnostic","body":"temp"}'

      - uses: googleapis/release-please-action@v4
        with:
          # Classic PAT with `repo` scope — the built-in GITHUB_TOKEN can open the
          # release PR but can't create the release itself. (A prior version of
          # this comment blamed an "enterprise policy" for that; this account has
          # no enterprise ties, so that was a guess, not a confirmed cause.)
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
