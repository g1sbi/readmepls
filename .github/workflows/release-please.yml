name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Classic PAT with `repo` scope — the built-in GITHUB_TOKEN can open the
          # release PR but can't create the release itself. (A prior version of
          # this comment blamed an "enterprise policy" for that; this account has
          # no enterprise ties, so that was a guess, not a confirmed cause.)
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
